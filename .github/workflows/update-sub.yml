name: Update Gist Subscription

on:
  schedule:
    - cron: '0 */2 * * *'   # 每2小时
  workflow_dispatch:

jobs:
  update-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest nodes
        run: |
          PAGE=$(curl -s -L -A "Mozilla/5.0" "https://vpngocn.com/mianfei-jiedian/")
          SUB_LINK=$(echo "$PAGE" | grep -o 'https://[^"]*tosslk.xyz/[^"]*' | head -n1)
          curl -s -L "$SUB_LINK" > sub.txt
          echo "✅ 获取成功"

      - name: Update Gist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GIST_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('sub.txt', 'utf8');
            await github.request('PATCH /gists/{gist_id}', {
              gist_id: '07f00885129d55779c9acdc065d26f24',
              files: {
                'sub.txt': { content: content }
              }
            });
            console.log('✅ Gist 更新完成');