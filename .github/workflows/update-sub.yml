name: Update Gist Subscription

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch nodes from website
        run: |
          PAGE=$(curl -s -L -A "Mozilla/5.0 (iPad; CPU OS 18_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.0 Mobile/15E148 Safari/604.1" \
                       -H "Referer: https://vpngocn.com/" \
                       "https://vpngocn.com/mianfei-jiedian/")
          SUB_LINK=$(echo "$PAGE" | grep -o 'https://[^"]*tosslk.xyz/[^"]*' | head -n1)
          
          curl -s -L -A "Mozilla/5.0 (iPad; CPU OS 18_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/18.0 Mobile/15E148 Safari/604.1" \
               -H "Referer: https://vpngocn.com/" \
               "$SUB_LINK" > sub.txt
          
          echo "SUB_CONTENT_SIZE=$(wc -c < sub.txt)" >> $GITHUB_ENV

      - name: Update Gist
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GIST_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('sub.txt', 'utf8');
            await github.request('PATCH /gists/{gist_id}', {
              gist_id: '07f00885129d55779c9acdc065d26f24',
              files: {
                'sub.txt': {
                  content: content
                }
              }
            });
            console.log('Gist 更新成功');