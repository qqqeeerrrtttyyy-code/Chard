name: Auto Update Free Sub

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download real nodes
        run: |
          PAGE=$(curl -s -L "https://vpngocn.com/mianfei-jiedian/")
          SUB_LINK=$(echo "$PAGE" | grep -o 'https://[^"]*tosslk.xyz/[^"]*' | head -n1)
          curl -s -L "$SUB_LINK" > sub.txt
          echo "Downloaded nodes from $SUB_LINK"

      - name: Commit sub.txt
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add sub.txt
          git commit -m "Update nodes $(date)" || echo "No new nodes"
          git push