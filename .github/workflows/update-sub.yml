name: Auto Update Free Sub

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest subscription
        run: |
          echo "正在抓取 https://vpngocn.com/mianfei-jiedian/"
          PAGE=$(curl -s -L -A "Mozilla/5.0" "https://vpngocn.com/mianfei-jiedian/")
          SUB_LINK=$(echo "$PAGE" | grep -o 'https://[^"]*tosslk.xyz/[^"]*' | head -n1)
          
          if [ -n "$SUB_LINK" ]; then
            echo "✅ 抓取成功：$SUB_LINK"
            echo "$SUB_LINK" > sub.txt
            echo "SUB_LINK=$SUB_LINK" >> $GITHUB_ENV
          else
            echo "❌ 抓取失败"
            exit 1
          fi

      - name: Upload sub.txt as artifact
        uses: actions/upload-artifact@v4
        with:
          name: subscription
          path: sub.txt
